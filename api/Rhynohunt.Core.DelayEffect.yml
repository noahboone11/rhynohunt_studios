    id: DelayEffect
    path: src/Rhynohunt.Core/DelayEffect.cs
    startLine: 11
  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    An <xref href="Rhynohunt.Core.IEffect" data-throw-if-not-resolved="false"></xref> that adds a decaying echo by mixing the original signal with a

    delayed copy of itself. The echo repeats with each successive reflection attenuated by

    <xref href="Rhynohunt.Core.DelayEffect.Feedback" data-throw-if-not-resolved="false"></xref>, producing a natural reverb tail.
  remarks: >-
    The delay is calculated as <code>(int)(DelayTime.TotalSeconds * sampleRate) * 2</code> array elements,

    where the factor of 2 accounts for the stereo interleaved layout (L, R pairs) of the input buffer.
  example: []
