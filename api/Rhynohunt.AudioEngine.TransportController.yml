  assemblies:
  - Rhynohunt.AudioEngine
  namespace: Rhynohunt.AudioEngine
  summary: >-
    High-level playback controller that owns a <xref href="Rhynohunt.Core.Mixer" data-throw-if-not-resolved="false"></xref> and an <xref href="Rhynohunt.AudioEngine.AudioEngine" data-throw-if-not-resolved="false"></xref>.

    Provides transport controls (play, pause, stop, seek), exposes timeline properties, and fires

    events for UI or other subscribers to react to state and time changes.

    Implements <xref href="System.IDisposable" data-throw-if-not-resolved="false"></xref> to release underlying resources.
