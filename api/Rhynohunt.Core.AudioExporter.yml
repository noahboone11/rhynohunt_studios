  summary: >-
    Renders a <xref href="Rhynohunt.Core.Session" data-throw-if-not-resolved="false"></xref> to an audio file on disk.

    The full timeline is mixed offline using <xref href="Rhynohunt.Core.Mixer.Render(System.Int32%2cSystem.Single%5b%5d%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> and written in a

    single pass — no audio device is required.
