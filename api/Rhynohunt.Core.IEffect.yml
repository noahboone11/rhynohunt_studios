  type: Method
  source:
    remote:
      path: src/Rhynohunt.Core/IEffect.cs
      branch: main
      repo: git@github.com:noahboone11/rhynohunt_studios.git
    id: Process
    path: src/Rhynohunt.Core/IEffect.cs
    startLine: 18
  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Processes the provided sample buffer and returns the effected result.

    The returned array may be a new allocation or the same array modified in place.
  example: []
  syntax:
    content: float[] Process(float[] samples, int sampleRate)
    parameters:
    - id: samples
      type: System.Single[]
      description: Stereo interleaved float samples in the range [-1.0, 1.0].
    - id: sampleRate
      type: System.Int32
      description: The audio sample rate in Hz (e.g. 44100).
    return:
      type: System.Single[]
      description: The processed sample buffer, same length as <code class="paramref">samples</code>.
    content.vb: Function Process(samples As Single(), sampleRate As Integer) As Single()
