  namespace: Rhynohunt.Core
  summary: Applies the delay effect to the provided stereo interleaved sample buffer.
  example: []
  syntax:
    content: public float[] Process(float[] samples, int sampleRate)
    parameters:
    - id: samples
      type: System.Single[]
      description: The stereo interleaved input buffer.
    - id: sampleRate
      type: System.Int32
      description: The audio sample rate in Hz (e.g. 44100).
    return:
      type: System.Single[]
      description: A new float array with the delay echo applied.
