  - csharp
  - vb
  name: Render(int, float[], int)
  nameWithType: Mixer.Render(int, float[], int)
  fullName: Rhynohunt.Core.Mixer.Render(int, float[], int)
  type: Method
  source:
    remote:
      path: src/Rhynohunt.Core/Mixer.cs
      branch: main
      repo: git@github.com:noahboone11/rhynohunt_studios.git
    id: Render
    path: src/Rhynohunt.Core/Mixer.cs
    startLine: 41
  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Renders all active tracks into the provided stereo interleaved output buffer.

    Respects each clip's <xref href="Rhynohunt.Core.AudioClip.StartTime" data-throw-if-not-resolved="false"></xref> and each track's gain, pan, mute, and solo settings.

    Output samples are clamped to [-1.0, 1.0] to prevent clipping.
  example: []
  syntax:
    content: public void Render(int position, float[] buffer, int frameCount)
    parameters:
    - id: position
      type: System.Int32
      description: The current playback position in frames (samples per channel).
    - id: buffer
      type: System.Single[]
      description: >-
        The stereo interleaved float output buffer to fill, with layout [L0, R0, L1, R1, ...].

        Must have at least <code class="paramref">frameCount</code> * 2 elements.
    - id: frameCount
      type: System.Int32
      description: The number of frames (sample pairs) to render.
    content.vb: Public Sub Render(position As Integer, buffer As Single(), frameCount As Integer)
  overload: Rhynohunt.Core.Mixer.Render*
  nameWithType.vb: Mixer.Render(Integer, Single(), Integer)
  fullName.vb: Rhynohunt.Core.Mixer.Render(Integer, Single(), Integer)
  name.vb: Render(Integer, Single(), Integer)
