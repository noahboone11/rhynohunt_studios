- uid: Rhynohunt.Core.Mixer.Render(System.Int32,System.Single[],System.Int32)
  commentId: M:Rhynohunt.Core.Mixer.Render(System.Int32,System.Single[],System.Int32)
  id: Render(System.Int32,System.Single[],System.Int32)
