    id: RecordThenPlayback
    path: src/Rhynohunt.AudioEngine/AudioTest.cs
    startLine: 141
  assemblies:
  - Rhynohunt.AudioEngine
  namespace: Rhynohunt.AudioEngine
  summary: >-
    Records mono audio from an input device, then immediately plays it back

    as stereo on an output device. Useful for verifying end-to-end audio routing.
  example: []
  syntax:
    content: public static void RecordThenPlayback(int inputDevice, int outputDevice, int durationSeconds = 5)
    parameters:
    - id: inputDevice
      type: System.Int32
      description: The PortAudio input device index to record from.
    - id: outputDevice
      type: System.Int32
      description: The PortAudio output device index to play back through.
    - id: durationSeconds
      type: System.Int32
      description: How long to record, in seconds. Defaults to 5.
    content.vb: Public Shared Sub RecordThenPlayback(inputDevice As Integer, outputDevice As Integer, durationSeconds As Integer = 5)
  overload: Rhynohunt.AudioEngine.AudioTest.RecordThenPlayback*
  nameWithType.vb: AudioTest.RecordThenPlayback(Integer, Integer, Integer)
  fullName.vb: Rhynohunt.AudioEngine.AudioTest.RecordThenPlayback(Integer, Integer, Integer)
