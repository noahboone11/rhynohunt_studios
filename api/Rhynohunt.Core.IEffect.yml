  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Defines a single audio processing effect that transforms a buffer of PCM samples.

    Effects are applied per-track in <xref href="Rhynohunt.Core.Mixer.Render(System.Int32%2cSystem.Single%5b%5d%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> after gain and pan have been applied.

    The input buffer is always stereo interleaved (layout: L0, R0, L1, R1, ...).
  example: []
  syntax:
    content: public interface IEffect
    content.vb: Public Interface IEffect
  derivedClasses:
  - Rhynohunt.Core.DelayEffect
  - Rhynohunt.Core.GainEffect
