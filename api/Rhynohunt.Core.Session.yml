  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Represents a recording session — the top-level container for a collection of

    <xref href="Rhynohunt.Core.Track" data-throw-if-not-resolved="false"></xref> objects. Supports adding and removing tracks, loading clips

    onto tracks, JSON-based save/load, and timed auto-save.

    Implements <xref href="System.IDisposable" data-throw-if-not-resolved="false"></xref> to release the auto-save timer.
  example: []
  syntax:
    content: 'public class Session : IDisposable'
    content.vb: Public Class Session Implements IDisposable
