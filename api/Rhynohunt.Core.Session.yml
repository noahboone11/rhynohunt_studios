  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Loads an <xref href="Rhynohunt.Core.AudioClip" data-throw-if-not-resolved="false"></xref> from the given file path and adds it to

    the specified track at the given timeline position.
  example: []
  syntax:
    content: public AudioClip LoadClipOnTrack(Track track, string filePath, TimeSpan startTime)
    parameters:
    - id: track
      type: Rhynohunt.Core.Track
      description: The track to add the clip to. Must belong to this session.
    - id: filePath
      type: System.String
      description: The absolute or relative path to the audio file (WAV or MP3).
    - id: startTime
      type: System.TimeSpan
      description: The position on the timeline where the clip begins.
    return:
      type: Rhynohunt.Core.AudioClip
      description: The loaded <xref href="Rhynohunt.Core.AudioClip" data-throw-if-not-resolved="false"></xref>.
