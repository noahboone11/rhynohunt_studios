    id: ExportMp3
    path: src/Rhynohunt.Core/AudioExporter.cs
    startLine: 41
  assemblies:
  - Rhynohunt.Core
  namespace: Rhynohunt.Core
  summary: >-
    Renders the entire session mix and encodes it as an MP3 file.

    Requires <code>ffmpeg</code> or <code>lame</code> to be installed and on the system PATH.

    On macOS: <code>brew install ffmpeg</code>.  On Windows/Linux: install ffmpeg from ffmpeg.org.
  example: []
  syntax:
    content: public static void ExportMp3(Session session, string outputPath)
    parameters:
    - id: session
      type: Rhynohunt.Core.Session
      description: The session to export.
    - id: outputPath
      type: System.String
      description: The destination file path for the MP3 file.
    content.vb: Public Shared Sub ExportMp3(session As Session, outputPath As String)
  overload: Rhynohunt.Core.AudioExporter.ExportMp3*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when neither <code>ffmpeg</code> nor <code>lame</code> is available on the PATH.
  nameWithType.vb: AudioExporter.ExportMp3(Session, String)
  fullName.vb: Rhynohunt.Core.AudioExporter.ExportMp3(Rhynohunt.Core.Session, String)
  name.vb: ExportMp3(Session, String)
