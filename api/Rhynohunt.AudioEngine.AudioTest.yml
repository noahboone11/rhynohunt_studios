  assemblies:
  - Rhynohunt.AudioEngine
  namespace: Rhynohunt.AudioEngine
  summary: >-
    Plays a sine wave tone on the specified output device for a given duration.

    The tone is output as stereo Float32 at 44100 Hz with 256 frames per buffer.
  example: []
  syntax:
    content: public static void PlaySineWave(int deviceIndex, double frequency = 440, int durationSeconds = 3)
    parameters:
    - id: deviceIndex
      type: System.Int32
      description: The PortAudio output device index to use.
    - id: frequency
      type: System.Double
      description: The frequency of the sine wave in Hz. Defaults to 440 Hz (concert A).
    - id: durationSeconds
      type: System.Int32
      description: How long to play the tone, in seconds. Defaults to 3.
    content.vb: Public Shared Sub PlaySineWave(deviceIndex As Integer, frequency As Double = 440, durationSeconds As Integer = 3)
